<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evolution</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
<h1 class="background-text">
    EVOLUTION
</h1>

    <div class="container">

<div class="left-side">

    <div class="avatar">
        👾
    </div>

    <h2 class="player-name">
        NOME DO JOGADOR
    </h2>

    <div class="profile">

        <h1>PROGRESSO</h1>

        <div class="level-box">

            <span id="level-text">
                Nível 1
            </span>

            <span id="xp-text">
                0 / 100 XP
            </span>

        </div>

        <div class="xp-bar">

            <div class="xp-progress"></div>

        </div>

    </div>

</div>
        <div class="right-side">

            <div class="habit">
                <span>💧 Beber água</span>

                <button class="done-btn">
                    CLAIM XP
                </button>
            </div>

            <div class="habit">
                <span>📚 Estudar</span>

                <button class="done-btn">
                    CLAIM XP
                </button>
            </div>

            <div class="habit">
                <span>🏋 Treinar</span>

                <button class="done-btn">
                    CLAIM XP
                </button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

  <script src="script.js"></script>
</body>
</html>
